name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck and bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats
      - name: make check
        run: make check
