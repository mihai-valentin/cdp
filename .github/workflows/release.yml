name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build tarball + checksum
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NAME="cdp-${VERSION}"
          git archive --format=tar.gz --prefix="${NAME}/" -o "${NAME}.tar.gz" HEAD
          sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          ls -la cdp-*.tar.gz cdp-*.sha256

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          gh release create "${TAG}" \
            --title "cdp ${VERSION}" \
            --generate-notes \
            "cdp-${VERSION}.tar.gz" \
            "cdp-${VERSION}.tar.gz.sha256"
